name: Python tests

# Run on every push to any branch.
# For pull requests from forks, GitHub's built-in fork PR approval
# (Settings → Actions → "Require approval for all outside collaborators")
# gates the run: any repository collaborator can approve via the
# "Approve and run" button on the PR page.
on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the minimum (pfSense CE 2.8 / FreeBSD 15 baseline).
        # Also test against the current stable and latest releases.
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: |
          cd src/usr/local/pkg/pfblockerng
          python -m pytest tests/ -v
